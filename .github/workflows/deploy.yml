# =============================================================================
# Déploiement automatique du portfolio sur GitHub Pages.
# =============================================================================
# À CHAQUE PUSH sur la branche `main`, ce workflow :
#   1. Récupère le code du repo
#   2. Le publie sur GitHub Pages
# Tu n'as RIEN à faire de plus : push -> ton site est en ligne en ~1 minute.
#
# PRÉREQUIS (à faire UNE SEULE FOIS) :
#   - Va dans Settings de ton repo > Pages
#   - Source : "GitHub Actions"
#   - C'est tout, ce fichier s'occupe du reste.
# =============================================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # permet aussi un lancement manuel

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # On envoie TOUT le repo (le PHP/MVC reste dans /php-mvc/ mais
          # GitHub Pages ne sert que les fichiers statiques de toute façon).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
